# ship.tmux.conf — the Deck
# One session per charter (ship-<charter>), one window per role.
# Window creation is handled by ship/bin/sail; this file handles behavior & looks.

# --- core behavior ---
set -g default-terminal "tmux-256color"
set -g extended-keys on        # pi's TUI needs this for modified-Enter combos; found via a real Captain session
set -g history-limit 50000
set -sg escape-time 10
set -g mouse on
# mouse on (above) captures click-drag for tmux's own copy-mode instead of
# letting the terminal do native selection -- Shift+drag always bypasses this
# regardless of terminal. The two lines below make keyboard copy-mode (prefix
# [, select, y) AND mouse-drag selection both reach the host clipboard for
# any client terminal that supports OSC 52 (confirmed: Windows Terminal).
set -g set-clipboard on
set -as terminal-features ',*:clipboard'
set -g base-index 0            # bridge is window 0, always
set -g renumber-windows off    # role numbers are muscle memory; never renumber
set -g allow-rename off        # roles keep their names; agents can't rename windows
set -g automatic-rename off

# --- activity: crew windows flash in the status bar when they finish or SOS ---
set -g monitor-activity on
set -g visual-activity off     # no popup banner; the status bar highlight is enough
set -g activity-action other

# --- status bar ---
# Two rows, not one: role windows (sail's fixed 0-9) on row 0, crew windows
# (10+, spawned/closed as muster runs) on row 1 -- this is a genuine tmux
# feature (the `status` option accepts 2-5, each row driven by its own
# status-format[n]), not a hack. tmux has no native "wrap overflowing tabs
# onto a second line" behavior -- an overflowing single-row window list just
# scrolls to keep the current window in view, tabs off both edges stay
# hidden -- so getting an always-visible second row means building it
# ourselves. Chose the role/crew split (rather than e.g. an evenly-computed
# wrap) because it's a real structural fact about this system, not an
# arbitrary line-break: role windows are always exactly indices 0-9 (fixed
# by sail), crew are always 10+, so filtering #{W:...} by #{window_index} is
# exact and needs no dynamic computation or reload on muster/prune. Verified
# live against a real running deck (temporarily added/removed a dummy
# window at index 15) before writing this: role windows land on row 0, crew
# on row 1, row 1 renders as an empty (but still teal) bar when no crew are
# running rather than erroring.
#
# Each row is built from #{W:...}, tmux's own per-window iterator, wrapped
# in an index conditional (#{e|<|:#{window_index},10} / #{e|>=|:...,10} --
# the `e|op|:` form, confirmed against this ship's `man tmux`; the bare
# `#{<:...}` form does a *string* compare, which breaks past index 9 since
# "9" > "10" lexically). Reuses #{E:window-status-format} /
# #{E:window-status-current-format} (the options below) rather than
# hardcoding styling a second time, so window-status-current-style and
# window-status-activity-style (the amber SOS/completion flash) keep working
# unchanged on both rows -- confirmed by inspecting tmux's own real built-in
# status-format[0] (`tmux show-options -g status-format[0]`) and matching
# its structure rather than guessing. Each window is also wrapped in
# `#[range=window|N]` (documented under "Mark a range for mouse events") so
# clicking a tab still switches windows on row 1, not just row 0 -- lost if
# you build a window list by hand without it.
set -g status 2
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=colour29,fg=colour194"            # teal deck
set -g status-left-length 30
set -g status-left "#[bg=colour23,fg=colour194,bold] #S #[default] "
set -g status-right "#[fg=colour151]%H:%M · #H "
set -g status-format[0] "#[align=left]#{T;=/#{status-left-length}:status-left}#{W:#{?#{e|<|:#{window_index},10},#[range=window|#{window_index}]#{?window_active,#{E:window-status-current-format},#{E:window-status-format}}#[norange],}}#[align=right]#{T;=/#{status-right-length}:status-right}"
set -g status-format[1] "#[align=left]#{W:#{?#{e|>=|:#{window_index},10},#[range=window|#{window_index}]#{?window_active,#{E:window-status-current-format},#{E:window-status-format}}#[norange],}}"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "bg=colour23,fg=colour157,bold"
setw -g window-status-current-format " #I:#W* "
setw -g window-status-activity-style "bg=colour214,fg=colour233,bold"  # amber flash

# --- quality of life ---
bind r source-file ~/.tmux.conf \; display-message "deck config reloaded"
bind S choose-session          # the Fleet Board, one keystroke past prefix+s default
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
